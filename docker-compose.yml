# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Docker Compose (Coolify — 100% Green Healthchecks)
# ──────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=${PORT:-20128}
    - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
    - API_PORT=${API_PORT:-20129}
    - API_HOST=${API_HOST:-0.0.0.0}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    - COMPOSE_PROFILES=${COMPOSE_PROFILES:-host,web,memory,bifrost,cliproxyapi}
  volumes:
    - ./data:/app/data
  # NOTE: यह common healthcheck केवल fallback है।
  # हर service का अपना custom healthcheck नीचे define किया गया है।
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-20128}/ >/dev/null 2>&1 || wget -q --spider http://127.0.0.1:${PORT:-20128}/ 2>/dev/null || (exec 3<>/dev/tcp/127.0.0.1/${PORT:-20128}) 2>/dev/null || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 40s

services:
  # ── Redis ──────────────────────────────────
  redis:
    image: docker.io/library/redis:latest
    container_name: omniroute-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      # FIX: redis-cli ping सबसे reliable है — हमेशा काम करता है
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Profile: host (Main App — Coolify इसे track करता है) ────
  omniroute-host:
    <<: *common
    container_name: omniroute
    image: diegosouzapw/omniroute:latest
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - CLI_MODE=host
      - CLI_EXTRA_PATHS=/host-local/bin:/host-node/bin
      - CLI_CONFIG_HOME=/host-home
      - CLI_ALLOW_CONFIG_WRITES=true
    volumes:
      - ./data:/app/data
      - ~/.local/bin:/host-local/bin:ro
      - ~/.codex:/host-home/.codex:rw
      - ~/.claude:/host-home/.claude:rw
      - ~/.factory:/host-home/.factory:rw
      - ~/.openclaw:/host-home/.openclaw:rw
      - ~/.cursor:/host-home/.cursor:rw
      - ~/.config/cursor:/host-home/.config/cursor:rw
    # FIX: Real healthcheck — curl → wget → bash /dev/tcp fallback chain
    # अगर app अभी boot हो रहा हो तो start_period=60s उसे grace देता है
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${DASHBOARD_PORT:-20128}/ >/dev/null 2>&1 || wget -q --spider http://127.0.0.1:${DASHBOARD_PORT:-20128}/ 2>/dev/null || (exec 3<>/dev/tcp/127.0.0.1/${DASHBOARD_PORT:-20128}) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    profiles:
      - host

  # ── Profile: memory ──────────────────────
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: omniroute-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    # FIX: qdrant image में curl/wget दोनों हो सकते हैं या नहीं भी।
    # /readyz endpoint सही है लेकिन हम multi-tool fallback use करेंगे।
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6333/readyz >/dev/null 2>&1 || wget -q --spider http://127.0.0.1:6333/readyz 2>/dev/null || (exec 3<>/dev/tcp/127.0.0.1/6333) 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    profiles:
      - memory

  # ── Profile: bifrost ─────────────────────
  bifrost:
    image: maximhq/bifrost:v2.0.0-prerelease1-ubi9
    container_name: omniroute-bifrost
    restart: unless-stopped
    ports:
      - "${BIFROST_PORT:-8081}:8080"
    volumes:
      - bifrost-data:/data
    environment:
      - BIFROST_LOG_LEVEL=${BIFROST_LOG_LEVEL:-info}
    # FIX: UBI9 image में curl available है (wget नहीं)।
    # Internal port 8080 है (external 8081 नहीं)।
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1 || curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1 || (exec 3<>/dev/tcp/127.0.0.1/8080) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    profiles:
      - bifrost

  # ── Profile: cliproxyapi ─────────────────
  cliproxyapi:
    container_name: cliproxyapi
    image: eceasy/cli-proxy-api:v7.2.66
    restart: unless-stopped
    ports:
      - "${CLIPROXYAPI_PORT:-8317}:${CLIPROXYAPI_PORT:-8317}"
    volumes:
      - cliproxyapi-data:/root/.cli-proxy-api
    environment:
      - PORT=${CLIPROXYAPI_PORT:-8317}
      - HOST=0.0.0.0
    # FIX: Multi-tool fallback — curl → wget → bash /dev/tcp
    # /v1/models endpoint authenticate कर सकता है, इसलिए root path भी try करेंगे।
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models >/dev/null 2>&1 || curl -fsS http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/ >/dev/null 2>&1 || wget -q --spider http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/ 2>/dev/null || (exec 3<>/dev/tcp/127.0.0.1/${CLIPROXYAPI_PORT:-8317}) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    profiles:
      - cliproxyapi

volumes:
  cliproxyapi-data:
    name: cliproxyapi-data
  redis-data:
    name: omniroute-redis-data
  qdrant-data:
    name: omniroute-qdrant-data
  bifrost-data:
    name: omniroute-bifrost-data
