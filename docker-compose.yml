services:
  redis:
    image: docker.io/library/redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning

  omniroute:
    image: diegosouzapw/omniroute:latest-web
    restart: unless-stopped
    ports:
      - "20128:20128"
      - "20129:20129"
    environment:
      - DATA_DIR=/app/data
      - PORT=20128
      - DASHBOARD_PORT=20128
      - API_PORT=20129
      - API_HOST=0.0.0.0
      - CLI_MODE=disabled
      - PLAYWRIGHT_BROWSERS_PATH=/app/browsers
      - CHROMIUM_FLAGS=--no-sandbox --disable-setuid-sandbox
      - NODE_ENV=production
      - LOG_LEVEL=debug
    volumes:
      - omniroute-data:/app/data
      - browser-data:/app/browsers
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.omniroute.rule=Host(`localhost`) || PathPrefix(`/`)"
      - "traefik.http.routers.omniroute.entrypoints=web"
      - "traefik.http.services.omniroute.loadbalancer.server.port=20128"

volumes:
  redis-data:
  omniroute-data:
  browser-data:
