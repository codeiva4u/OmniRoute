# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Docker Compose
# ──────────────────────────────────────────────────────────────────────
#
#  Profiles:
#    web   → runner-web (+Chromium/Playwright) for web-cookie providers
#    cliproxyapi → CLIProxyAPI sidecar on port 8317
#    memory  → Qdrant sidecar on port 6333 (semantic memory offload)
#    bifrost → Bifrost Go sidecar on port 8080 (Tier-1 LLM router)
#
# ──────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=${PORT:-20128}
    - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
    - API_PORT=${API_PORT:-20129}
    - API_HOST=${API_HOST:-0.0.0.0}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    - COMPOSE_PROFILES=${COMPOSE_PROFILES:-web,memory,bifrost,cliproxyapi}
  volumes:
    - omniroute-data:/app/data
  healthcheck:
    test: ["CMD", "node", "healthcheck.mjs"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  # ── Redis (Rate Limiter Backend) ──────────────────────────────────
  redis:
    image: docker.io/library/redis:latest
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Profile: web (runner-web + Chromium/Playwright) ────────────────
  omniroute-web:
    <<: *common
    image: diegosouzapw/omniroute:latest
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - COMPOSE_PROFILES=${COMPOSE_PROFILES:-web,memory,bifrost,cliproxyapi}
      - CLI_MODE=enable
      - PLAYWRIGHT_BROWSERS_PATH=/app/browsers
    volumes:
      - omniroute-data:/app/data
      - browser-data:/app/browsers
    profiles:
      - web

  # ── Profile: memory (Qdrant semantic-memory sidecar) ─────────────
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - memory

  # ── Profile: bifrost (Bifrost Go LLM-router sidecar) ─────────────
  bifrost:
    image: maximhq/bifrost:v2.0.0-prerelease1-ubi9
    restart: unless-stopped
    ports:
      - "${BIFROST_PORT:-8081}:8080"
    volumes:
      - bifrost-data:/data
    environment:
      - BIFROST_LOG_LEVEL=${BIFROST_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - bifrost

  # ── Profile: cliproxyapi (CLIProxyAPI as sidecar) ─────────────────
  cliproxyapi:
    image: eceasy/cli-proxy-api:v7.2.66
    restart: unless-stopped
    ports:
      - "${CLIPROXYAPI_PORT:-8317}:${CLIPROXYAPI_PORT:-8317}"
    volumes:
      - cliproxyapi-data:/root/.cli-proxy-api
    configs:
      - source: cliproxyapi_config
        target: /CLIProxyAPI/config.yaml
    environment:
      - PORT=${CLIPROXYAPI_PORT:-8317}
      - HOST=0.0.0.0
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - cliproxyapi

volumes:
  cliproxyapi-data:
    name: cliproxyapi-data
  redis-data:
    name: omniroute-redis-data
  qdrant-data:
    name: omniroute-qdrant-data
  bifrost-data:
    name: omniroute-bifrost-data
  omniroute-data:
    name: omniroute-data
  browser-data:
    name: omniroute-browser-data

configs:
  cliproxyapi_config:
    content: |
      host: "0.0.0.0"
      port: 8317
