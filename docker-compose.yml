x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=${PORT:-20128}
    - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
    - API_PORT=${API_PORT:-20129}
    - API_HOST=${API_HOST:-0.0.0.0}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    - COMPOSE_PROFILES=${COMPOSE_PROFILES:-web,memory,bifrost,cliproxyapi}
  volumes:
    - omniroute-data:/app/data
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://127.0.0.1:20128 || wget -q -O /dev/null http://127.0.0.1:20128 || exit 1"]
    interval: 30s
    timeout: 15s
    retries: 5
    start_period: 180s

services:
  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  omniroute:
    image: diegosouzapw/omniroute:latest-web
    restart: unless-stopped
    ports:
      - "20128:20128"
      - "20129:20129"
    environment:
      - DATA_DIR=/app/data
      - PORT=20128
      - API_HOST=0.0.0.0
      - CLI_MODE=disabled
    volumes:
      - omniroute-data:/app/data
      - browser-data:/app/browsers
    depends_on:
      - redis

volumes:
  redis-data:
  omniroute-data:
  browser-data:
  omniroute-web:
    <<: *common
    image: diegosouzapw/omniroute:latest-web
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - CLI_MODE=disabled
      - PLAYWRIGHT_BROWSERS_PATH=/app/browsers
      - CHROMIUM_FLAGS=--no-sandbox --disable-setuid-sandbox
    volumes:
      - omniroute-data:/app/data
      - browser-data:/app/browsers
    depends_on:
      - redis
    profiles:
      - web

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:6333/readyz || curl -f http://127.0.0.1:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - memory

  bifrost:
    image: maximhq/bifrost:v2.0.0-prerelease1-ubi9
    restart: unless-stopped
    ports:
      - "${BIFROST_PORT:-8081}:8080"
    volumes:
      - bifrost-data:/data
    environment:
      - BIFROST_LOG_LEVEL=${BIFROST_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || curl -f http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - bifrost

  cliproxyapi:
    image: eceasy/cli-proxy-api:v7.2.66
    restart: unless-stopped
    ports:
      - "${CLIPROXYAPI_PORT:-8317}:${CLIPROXYAPI_PORT:-8317}"
    volumes:
      - cliproxyapi-data:/root/.cli-proxy-api
    configs:
      - source: cliproxyapi_config
        target: /CLIProxyAPI/config.yaml
    environment:
      - PORT=${CLIPROXYAPI_PORT:-8317}
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models || curl -f http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - cliproxyapi

volumes:
  cliproxyapi-data:
    name: cliproxyapi-data
  redis-data:
    name: omniroute-redis-data
  qdrant-data:
    name: omniroute-qdrant-data
  bifrost-data:
    name: omniroute-bifrost-data
  omniroute-data:
    name: omniroute-data
  browser-data:
    name: omniroute-browser-data

configs:
  cliproxyapi_config:
    content: |
      host: "0.0.0.0"
      port: 8317
