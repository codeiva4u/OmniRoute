# 🚨 Error का कारण (Root Cause)

आपके deployment log में error साफ़ दिख रहा है:
```
Error: non-string key in services.ports: 0
```

यह error इसलिए आया क्योंकि आपके `docker-compose.yml` में **एक service का नाम (service name) गायब है**। `redis:` service के बाद जो अगला block है, उसमें `ports:`, `environment:`, `volumes:` तो हैं लेकिन कोई service name (जैसे `omniroute-host:`) और `image:` नहीं है।

Docker Compose parser ने `ports` को एक service का नाम समझ लिया और array index `0` को उसका key, जो invalid है।

---

# ✅ Fully Fixed `docker-compose.yml`

यह complete corrected file है। इसे copy करके Coolify में paste करें:

```yaml
# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Docker Compose (Coolify-Ready, Fully Fixed)
# ──────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=${PORT:-20128}
    - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
    - API_PORT=${API_PORT:-20129}
    - API_HOST=${API_HOST:-0.0.0.0}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    - COMPOSE_PROFILES=${COMPOSE_PROFILES:-web,memory,bifrost,cliproxyapi}
  volumes:
    - omniroute-data:/app/data
  healthcheck:
    test: ["CMD", "node", "healthcheck.mjs"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 60s

services:
  # ── Redis (Rate Limiter Backend) ──────────────────────────────────
  redis:
    image: docker.io/library/redis:latest
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Profile: host (FIXED: Service name और image जोड़ा गया) ────────
  omniroute-host:
    <<: *common
    image: diegosouzapw/omniroute:latest
    ports:
      - "${DASHBOARD_PORT:-20128}:${DASHBOARD_PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-20128}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - CLI_MODE=host
      - CLI_EXTRA_PATHS=/host-local/bin:/host-node/bin
      - CLI_CONFIG_HOME=/host-home
      - CLI_ALLOW_CONFIG_WRITES=true
    volumes:
      - omniroute-data:/app/data
      - ~/.local/bin:/host-local/bin:ro
      - ~/.codex:/host-home/.codex:rw
      - ~/.claude:/host-home/.claude:rw
      - ~/.factory:/host-home/.factory:rw
      - ~/.openclaw:/host-home/.openclaw:rw
      - ~/.cursor:/host-home/.cursor:rw
      - ~/.config/cursor:/host-home/.config/cursor:rw
    profiles:
      - host

  # ── Profile: memory (Qdrant semantic-memory sidecar) ─────────────
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:6333/readyz || curl -f http://127.0.0.1:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - memory

  # ── Profile: bifrost (Bifrost Go LLM-router sidecar) ─────────────
  bifrost:
    image: maximhq/bifrost:v2.0.0-prerelease1-ubi9
    restart: unless-stopped
    ports:
      - "${BIFROST_PORT:-8081}:8080"
    volumes:
      - bifrost-data:/data
    environment:
      - BIFROST_LOG_LEVEL=${BIFROST_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || curl -f http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - bifrost

  # ── Profile: cliproxyapi (CLIProxyAPI as sidecar) ─────────────────
  cliproxyapi:
    image: eceasy/cli-proxy-api:v7.2.66
    restart: unless-stopped
    ports:
      - "${CLIPROXYAPI_PORT:-8317}:${CLIPROXYAPI_PORT:-8317}"
    volumes:
      - cliproxyapi-data:/root/.cli-proxy-api
    configs:
      - source: cliproxyapi_config
        target: /CLIProxyAPI/config.yaml
    environment:
      - PORT=${CLIPROXYAPI_PORT:-8317}
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models || curl -f http://127.0.0.1:${CLIPROXYAPI_PORT:-8317}/v1/models || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - cliproxyapi

volumes:
  cliproxyapi-data:
    name: cliproxyapi-data
  redis-data:
    name: omniroute-redis-data
  qdrant-data:
    name: omniroute-qdrant-data
  bifrost-data:
    name: omniroute-bifrost-data
  omniroute-data:
    name: omniroute-data

configs:
  cliproxyapi_config:
    content: |
      host: "0.0.0.0"
      port: 8317
```

---

# 🔧 क्या-क्या Fix किया गया?

| # | समस्या | समाधान |
|---|--------|--------|
| 1 | ❌ **Service name गायब** (`ports:` सीधे `services:` के अंदर) | ✅ `omniroute-host:` service name जोड़ा |
| 2 | ❌ **`image:` directive गायब** | ✅ `image: diegosouzapw/omniroute:latest` जोड़ा |
| 3 | ❌ **`container_name` Coolify से conflict** | ✅ सभी `container_name` हटाए |
| 4 | ❌ **`wget --spider` (HEAD request) fail होता है** | ✅ `wget -q -O /dev/null` (GET request) में बदला |
| 5 | ❌ **`API_PORT` inconsistent** (`20140` vs `20129`) | ✅ सभी जगह `20129`统一 किया |
| 6 | ❌ **`start_period: 15s` बहुत कम** | ✅ `60s` कर दिया (बूट टाइम के लिए) |
| 7 | ❌ **`timeout: 5s` बहुत कम** | ✅ `10s` कर दिया |

---

# 📋 अब क्या करें?

1. **Coolify में जाएं** → अपने `omni-route` resource पर क्लिक करें
2. **Configuration** tab में ऊपर वाला पूरा YAML paste करें
3. **Deploy** बटन दबाएं
4. 2-3 मिनट wait करें — सभी containers **green (healthy)** हो जाएंगे ✅

---

# 💡 Pro Tip

अगर आप `web` profile (Chromium/Playwright) का उपयोग करना चाहते हैं, तो `omniroute-host` service में `profiles: - host` की जगह `profiles: - web` कर दें और image को `diegosouzapw/omniroute:web` (या जो भी web variant हो) में बदल दें। लेकिन अभी के लिए `host` profile ही सबसे stable है।
