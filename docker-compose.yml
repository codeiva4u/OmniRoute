x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=20128
    - DASHBOARD_PORT=20128
    - API_PORT=20129
    - API_HOST=0.0.0.0
    - REDIS_URL=redis://redis:6379
    - COMPOSE_PROFILES=web
  volumes:
    - omniroute-data:/app/data

services:
  redis:
    image: docker.io/library/redis:latest
    container_name: omniroute-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  omniroute:
    <<: *common
    container_name: omniroute
    image: diegosouzapw/omniroute:latest-web
    ports:
      - "20128:20128"
      - "20129:20129"
    environment:
      - DATA_DIR=/app/data
      - PORT=20128
      - DASHBOARD_PORT=20128
      - API_PORT=20129
      - API_HOST=0.0.0.0
      - CLI_MODE=disabled
      - PLAYWRIGHT_BROWSERS_PATH=/app/browsers
      - CHROMIUM_FLAGS=--no-sandbox --disable-setuid-sandbox
    volumes:
      - omniroute-data:/app/data
      - browser-data:/app/browsers
    healthcheck:
      test: ["CMD-SHELL", "sleep 5 && curl -f http://127.0.0.1:20128 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    profiles:
      - web

volumes:
  redis-data:
    name: omniroute-redis-data
  omniroute-data:
    name: omniroute-data
  browser-data:
    name: omniroute-browser-data
