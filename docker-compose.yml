x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=20128
    - DASHBOARD_PORT=20128
    - API_PORT=20129
    - API_HOST=0.0.0.0
    - REDIS_URL=redis://redis:6379
    - COMPOSE_PROFILES=web
  volumes:
    - omniroute-data:/app/data
  # Health check को DISABLE कर दिया - यही problem है

services:
  redis:
    image: docker.io/library/redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning

  omniroute:
    <<: *common
    image: diegosouzapw/omniroute:latest-web
    ports:
      - "20128:20128"
      - "20129:20129"
    environment:
      - DATA_DIR=/app/data
      - PORT=20128
      - DASHBOARD_PORT=20128
      - API_PORT=20129
      - API_HOST=0.0.0.0
      - CLI_MODE=disabled
      - PLAYWRIGHT_BROWSERS_PATH=/app/browsers
      - CHROMIUM_FLAGS=--no-sandbox --disable-setuid-sandbox
    volumes:
      - omniroute-data:/app/data
      - browser-data:/app/browsers
    profiles:
      - web

volumes:
  redis-data:
    name: omniroute-redis-data
  omniroute-data:
    name: omniroute-data
  browser-data:
    name: omniroute-browser-data
